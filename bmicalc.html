<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   
</head>

<body>
    <div class="calculator">
        <h1>BMI CALCULATOR</h1>
        <input type="number" id="age" placeholder="Enter the age">
        <br>
        <input type="number" id="height" placeholder="Enter the  height">
        <br>
        <input type="number" id="weight" placeholder="Enter your weight">
        <button onclick=" bmicalculator()">calculate</button>
        <p class="result" id="result"></p>
    </div>
    <script>
        function bmicalculator() {
            const weight = parseInt(document.getElementById('weight').value);
            const age = parseInt(document.getElementById('age').value);
            const height = parseInt(document.getElementById('height').value);
        }
        if (height > 0 && weight > 0 && age > 0) {
            const bmi = (weight / (height * height)).toFixed(2);
            document.getElementById('result').innerText = 'your bmi is:${bmi}';
        }
    
    
    </script>
</body>


</html>
