<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let char = prompt("Enter a character: ");

let result = (char >= 'a' && char <= 'z') || (char >= 'A' && char <= 'Z') ? "Alphabet" : "Not an alphabet";

document.write(`The character '${char}' is ${result}.`);
    </script>
    
</body>
</html>
